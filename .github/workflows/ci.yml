name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test

      - name: Type-check renderer
        run: npm run typecheck

      - name: Type-check Electron and build config
        run: npx tsc -p tsconfig.node.json

      - name: Lint
        run: npm run lint
