name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm test
          npm run typecheck
          npx tsc -p tsconfig.node.json
          npm run lint

      - name: Build Windows installer
        run: npm run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Create checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem release -File -Filter '*.exe'
          if (-not $assets) { throw 'No Windows installer was built.' }
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset.FullName).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }
          $lines | Set-Content -Encoding ascii release/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: DCSHUB-Windows-Installer
          path: |
            release/*.exe
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $notesPath = "docs/releases/$tag.md"
            if (Test-Path -LiteralPath $notesPath) {
              gh release create $tag --title "DCSHUB $tag" --notes-file $notesPath
            } else {
              gh release create $tag --title "DCSHUB $tag" --generate-notes
            }
          }
          gh release upload $tag release/*.exe release/SHA256SUMS.txt --clobber
